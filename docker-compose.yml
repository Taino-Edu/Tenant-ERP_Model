# =============================================================================
# docker-compose.yml — Stack completa: Frontend + API + PostgreSQL + MongoDB
#
# COMO USAR (primeira vez):
#   cp .env.example .env        # preencha as variáveis
#   docker compose up --build -d
#
# Frontend:    http://<SEU_IP>:3000
# API/Swagger: http://<SEU_IP>:5000
# =============================================================================

version: '3.9'

services:

  # ---------------------------------------------------------------------------
  # FRONTEND — Next.js 14 (standalone)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # API_URL deve ser o endereço que o BROWSER vai usar para chamar a API.
        # Em desenvolvimento: http://localhost:5000
        # Na Oracle VM:       http://<IP_PUBLICO>:5000
        API_URL: ${API_URL:-http://localhost:5000}
    container_name: cardgamestore_frontend
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cardgame_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # API — CardGameStore ASP.NET Core 8
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./CardGameStore
      dockerfile: Dockerfile
    container_name: cardgamestore_api
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__PostgreSQL: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-cardgamestore};Username=${POSTGRES_USER:-cardgame_user};Password=${POSTGRES_PASSWORD}"
      MongoDbSettings__ConnectionString: "mongodb://mongo:27017"
      MongoDbSettings__DatabaseName: "cardgamestore_cache"
      JwtSettings__SecretKey: "${JWT_SECRET}"
      JwtSettings__Issuer: "${API_URL:-http://localhost:5000}"
      JwtSettings__Audience: "CardGameStore-Frontend"
      JwtSettings__AccessTokenExpirationMinutes: "60"
      JwtSettings__RefreshTokenExpirationDays: "30"
      TcgSettings__PokemonApiKey: "${POKEMON_API_KEY:-}"
      GeminiSettings__ApiKey:  "${GEMINI_API_KEY:-}"
      CorsSettings__AllowedOrigins: "${APP_URL:-http://localhost:3000}"
      Security__IpHashSalt:    "${SECURITY_IPHASHSALT:-softnerd-dev-salt}"
      EmailSettings__Host:     "${EMAIL_HOST:-}"
      EmailSettings__Port:     "${EMAIL_PORT:-587}"
      EmailSettings__User:     "${EMAIL_USER:-}"
      EmailSettings__Password: "${EMAIL_PASSWORD:-}"
      EmailSettings__From:     "${EMAIL_FROM:-noreply@softnerd.com.br}"
      EmailSettings__AppUrl:   "${APP_URL:-http://localhost:3000}"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - cardgame_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: cardgamestore_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cardgame_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cardgamestore}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cardgame_user} -d ${POSTGRES_DB:-cardgamestore}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cardgame_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MongoDB 7
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7-jammy
    container_name: cardgamestore_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cardgame_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # pgAdmin — apenas com: docker compose --profile tools up
  # http://<IP>:5050  |  email e senha definidos no .env
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cardgamestore_pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@cardgame.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    depends_on:
      - postgres
    networks:
      - cardgame_network
    profiles:
      - tools

volumes:
  postgres_data:
  mongo_data:

networks:
  cardgame_network:
    driver: bridge
