<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="18" fill="#6C3FC5"/>
  <!-- Carta traseira (verde) -->
  <rect x="38" y="28" width="30" height="42" rx="5" fill="#00F0A8" opacity="0.95"/>
  <!-- Carta frente (branca) -->
  <rect x="22" y="22" width="30" height="42" rx="5" fill="#ffffff"/>
  <!-- Listras decorativas na carta branca -->
