  <rect x="26" y="36" width="16" height="3" rx="1.5" fill="#E8E0F0"/>
  <!-- Símbolo S na carta branca -->
  <text x="37" y="58" font-family="Arial,sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#6C3FC5">S</text>
</svg>
