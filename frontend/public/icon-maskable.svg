<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fundo sólido (maskable: safe zone é o círculo de 80% no centro) -->
  <rect width="100" height="100" fill="#6C3FC5"/>
  <!-- Carta traseira (verde) -->
  <rect x="42" y="30" width="26" height="38" rx="4" fill="#00F0A8" opacity="0.95"/>
  <!-- Carta frente (branca) -->
  <rect x="28" y="24" width="26" height="38" rx="4" fill="#ffffff"/>
  <!-- S na carta -->
  <text x="41" y="50" font-family="Arial,sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#6C3FC5">S</text>
</svg>
