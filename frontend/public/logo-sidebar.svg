<svg viewBox="0 0 190 50" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo branco arredondado -->
  <rect width="190" height="50" rx="11" fill="white"/>

  <!-- Sombra no chão (efeito de salto) -->
  <ellipse cx="30" cy="46" rx="9" ry="2.5" fill="#00000018"/>

  <!-- Asa esquerda levantada -->
  <path d="M17 30 Q9 21 14 16 Q20 24 27 28 Z" fill="#F5D800"/>

  <!-- Asa direita levantada -->
  <path d="M42 26 Q51 17 52 13 Q45 22 37 25 Z" fill="#F5D800"/>

  <!-- Corpo (levemente inclinado — saltando!) -->
  <ellipse cx="30" cy="34" rx="13" ry="11" fill="#FFE646" transform="rotate(-5 30 34)"/>

  <!-- Cabeça -->
  <circle cx="33" cy="20" r="12" fill="#FFE646"/>

  <!-- Olho brilhante -->
  <circle cx="38" cy="17" r="2.8" fill="#222"/>
  <circle cx="39" cy="16" r="1.1" fill="white"/>

  <!-- Sorriso feliz -->
  <path d="M35 23 Q38 27 42 23" stroke="#444" stroke-width="1.4" fill="none" stroke-linecap="round"/>

  <!-- Bico laranja aberto (cantando de alegria) -->
  <path d="M44 18 L50 15 L48 21 Z" fill="#FF8C00"/>

  <!-- Patinha esquerda no ar -->
  <path d="M23 43 L20 49" stroke="#FF8C00" stroke-width="2" stroke-linecap="round"/>
  <path d="M20 49 L16 52 M20 49 L23 52" stroke="#FF8C00" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Patinha direita no ar -->
  <path d="M35 44 L37 50" stroke="#FF8C00" stroke-width="2" stroke-linecap="round"/>
  <path d="M37 50 L33 53 M37 50 L40 52" stroke="#FF8C00" stroke-width="1.6" stroke-linecap="round"/>

  <!-- "Santuário" em cinza escuro pequeno acima -->
  <text x="127" y="20" font-family="Arial,Helvetica,sans-serif" font-size="10.5" font-weight="700" text-anchor="middle" fill="#555" letter-spacing="1">Santuário</text>

  <!-- "NERD" grande em azul -->
  <text x="127" y="43" font-family="Arial Black,Arial,Helvetica,sans-serif" font-size="27" font-weight="900" text-anchor="middle" fill="#42B6EE">NERD</text>
</svg>
