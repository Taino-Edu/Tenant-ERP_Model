# =============================================================================
# docker-compose.prod.yml — Produção Tenant-ERP
#
# COMO USAR (primeira vez):
#   cd /opt/tenant-erp
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d
#
# Atualizar código:
#   git pull && docker compose -f docker-compose.prod.yml build && docker compose -f docker-compose.prod.yml up -d
#
# Acesso público: via domínio configurado em APP_URL (Cloudflare → porta 80)
#
# DIMENSIONAMENTO (VPS atual: 8 vCPU / 32 GB):
# Os limites abaixo somam ~7,5 vCPU e ~7,5 GB, deixando folga larga pro SO e
# page cache. Antes eram ~1,6 GB no total — ou seja, ~5% da RAM da máquina, com
# o Postgres preso em 512 MB numa VPS de 32 GB (era o gargalo mais caro e mais
# bobo do stack, já que Postgres usa RAM basicamente como cache).
# Limites não são reservas: o container só consome o que precisa, o teto existe
# pra um serviço com vazamento não derrubar os vizinhos.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # NGINX — Único serviço exposto ao mundo (porta 80)
  # Recebe HTTPS do Cloudflare e roteia para frontend e API
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: cardgamestore_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - api_uploads:/var/www/uploads:ro
    depends_on:
      - frontend
      - api
    networks:
      - cardgame_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # FRONTEND — Next.js 14
  # NEXT_PUBLIC_API_URL é baked no build (URL que o browser usa para a API)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        API_URL: ${APP_URL:-http://localhost}
        ROOT_DOMAIN: ${MULTITENANCY_ROOT_DOMAIN:-}
    image: cardgamestore_frontend:latest
    container_name: cardgamestore_frontend
    networks:
      - cardgame_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # API — ASP.NET Core 8
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../CardGameStore
      dockerfile: Dockerfile
    image: cardgamestore_api:latest
    container_name: cardgamestore_api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      # Banco de dados
      ConnectionStrings__PostgreSQL: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-cardgamestore};Username=${POSTGRES_USER:-cardgame_user};Password=${POSTGRES_PASSWORD}"
      # JWT
      JwtSettings__SecretKey: "${JWT_SECRET}"
      JwtSettings__Issuer: "${APP_URL:-http://localhost}"
      JwtSettings__Audience: "TenantErp-Frontend"
      JwtSettings__AccessTokenExpirationMinutes: "60"
      JwtSettings__RefreshTokenExpirationDays: "30"
      # E-mail (Resend)
      SmtpSettings__Host: "${SMTP_HOST:-smtp.resend.com}"
      SmtpSettings__Port: "${SMTP_PORT:-587}"
      SmtpSettings__Username: "${SMTP_USERNAME:-resend}"
      SmtpSettings__Password: "${SMTP_PASSWORD}"
      SmtpSettings__FromEmail: "${SMTP_FROM_EMAIL:-noreply@tenant-erp.local}"
      SmtpSettings__FromName: "${SMTP_FROM_NAME:-Tenant ERP}"
      SmtpSettings__AppUrl: "${APP_URL:-http://localhost}"
      # Integrações
      GeminiSettings__ApiKey: "${GEMINI_API_KEY}"
      # Prospecção de leads (/plataforma/prospeccao) — chave dedicada e opcional,
      # separada da GEMINI_API_KEY acima; sem ela, a busca funciona normalmente
      # e só o botão "Enriquecer com IA" fica indisponível.
      ProspectingSettings__GeminiApiKey: "${PROSPECTING_GEMINI_API_KEY}"
      # Inter PJ — certificado mTLS (Client ID/Secret são salvos via /admin/integracoes)
      Inter__CertificatePath: "/app/certs/inter/inter.crt"
      Inter__KeyPath: "/app/certs/inter/inter.key"
      # Segurança — só true quando estiver atrás de HTTPS (Cloudflare); em teste
      # via IP puro/HTTP direto tem que ser false, senão o cookie nunca é aceito.
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      CorsSettings__AllowedOrigins: "${APP_URL:-http://localhost}"
      # Multi-tenancy — domínio raiz dos subdomínios de tenant (ex: loja.SEU_DOMINIO).
      # Sem isso, TenantResolutionMiddleware.ExtractSlug() nunca acha slug nenhum e
      # toda requisição cai em tenant-zero, mesmo com o wildcard configurado no Nginx.
      Multitenancy__RootDomain: "${MULTITENANCY_ROOT_DOMAIN}"
      Security__IpHashSalt: "${IP_HASH_SALT}"
      Encryption__Key: "${ENCRYPTION_KEY}"
      # Seed do dono da plataforma (painel /plataforma) — só roda se preenchido.
      PLATFORM_OWNER_EMAIL: "${PLATFORM_OWNER_EMAIL}"
      PLATFORM_OWNER_SEED_PASSWORD: "${PLATFORM_OWNER_SEED_PASSWORD}"
      # Senha do admin@tenant-erp.local seedado no primeiro boot — faltava aqui,
      # então mesmo configurado no .env nunca chegava ao container (sempre caía
      # no fallback "SenhaForte@123"). Só afeta a criação inicial, não retroage.
      ADMIN_SEED_PASSWORD: "${ADMIN_SEED_PASSWORD}"
    volumes:
      - api_uploads:/app/wwwroot/uploads
      - ./certs/inter:/app/certs/inter
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cardgame_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # POSTGRESQL — Banco relacional (comandas, usuários, etc.)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: cardgamestore_postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-cardgamestore}
      POSTGRES_USER:     ${POSTGRES_USER:-cardgame_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cardgame_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cardgame_user} -d ${POSTGRES_DB:-cardgamestore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # EVOLUTION API — WhatsApp por tenant (feature premium). NÃO SOBE POR PADRÃO.
  #
  # Está atrás do profile "whatsapp": `docker compose up -d` normal (o que o
  # update.sh roda) ignora estes dois serviços. Para ligar:
  #     docker compose -f docker-compose.prod.yml --profile whatsapp up -d
  #
  # POR QUE CONTAINER SEPARADO (e não dentro da api): todo deploy recria o
  # container da api. Se as sessões de WhatsApp morassem lá, cada deploy
  # derrubaria a conexão de TODOS os tenants de uma vez — e reconectar sessão
  # Baileys frequentemente exige o cliente reler o QR Code. Separado, o ERP faz
  # deploy à vontade sem encostar nas sessões.
  #
  # ANTES DE LIGAR:
  #   1. Criar o banco:  docker exec cardgamestore_postgres \
  #        psql -U $POSTGRES_USER -c "CREATE DATABASE evolution;"
  #   2. Preencher EVOLUTION_API_KEY e EVOLUTION_SERVER_URL no .env
  #   3. Decidir o backend (ver DECISAO_WHATSAPP em docs/) — Baileys (não
  #      oficial, risco de ban do número do cliente) vs Cloud API oficial.
  #      A Evolution suporta os dois, então dá pra migrar sem trocar de stack.
  # ---------------------------------------------------------------------------
  evolution:
    image: evoapicloud/evolution-api:v2.1.1
    container_name: cardgamestore_evolution
    profiles: ["whatsapp"]
    environment:
      SERVER_URL: "${EVOLUTION_SERVER_URL}"
      AUTHENTICATION_API_KEY: "${EVOLUTION_API_KEY}"
      # Persistência — as credenciais de sessão vivem aqui. Ver backup.sh.
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://${POSTGRES_USER:-cardgame_user}:${POSTGRES_PASSWORD}@postgres:5432/evolution"
      DATABASE_CONNECTION_CLIENT_NAME: "evolution"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      # Cache — Redis dedicado. SAVE_INSTANCES=false porque a fonte de verdade
      # das instâncias é o Postgres; o Redis aqui é cache descartável.
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://redis:6379/6"
      CACHE_REDIS_PREFIX_KEY: "evolution"
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      # A API .NET recebe os eventos aqui e resolve o tenant pelo nome da instância.
      WEBHOOK_GLOBAL_URL: "${EVOLUTION_WEBHOOK_URL:-http://api:5000/api/whatsapp/webhook}"
      WEBHOOK_GLOBAL_ENABLED: "${EVOLUTION_WEBHOOK_ENABLED:-false}"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cardgame_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # ~50-150 MB por sessão Baileys viva 24/7 → ~30 tenants premium aqui.
          # Esta é a ÚNICA parte do stack que escala linearmente por tenant.
          cpus: '2.0'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: cardgamestore_redis
    profiles: ["whatsapp"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - cardgame_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# -----------------------------------------------------------------------------
# Volumes persistentes (dados sobrevivem a reinicios e redeploys)
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
  api_uploads:
  evolution_instances:
  redis_data:

# -----------------------------------------------------------------------------
# Rede interna Docker (containers se falam pelo nome do serviço)
# -----------------------------------------------------------------------------
networks:
  cardgame_network:
    driver: bridge
