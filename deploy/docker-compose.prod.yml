# =============================================================================
# docker-compose.prod.yml — Produção Tenant-ERP
#
# COMO USAR (primeira vez):
#   cd /opt/tenant-erp
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d
#
# Atualizar código:
#   git pull && docker compose -f docker-compose.prod.yml build && docker compose -f docker-compose.prod.yml up -d
#
# Acesso público: via domínio configurado em APP_URL (Cloudflare → porta 80)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # NGINX — Único serviço exposto ao mundo (porta 80)
  # Recebe HTTPS do Cloudflare e roteia para frontend e API
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: cardgamestore_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - api_uploads:/var/www/uploads:ro
    depends_on:
      - frontend
      - api
    networks:
      - cardgame_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # FRONTEND — Next.js 14
  # NEXT_PUBLIC_API_URL é baked no build (URL que o browser usa para a API)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        API_URL: ${APP_URL:-http://localhost}
    image: cardgamestore_frontend:latest
    container_name: cardgamestore_frontend
    networks:
      - cardgame_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # API — ASP.NET Core 8
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../CardGameStore
      dockerfile: Dockerfile
    image: cardgamestore_api:latest
    container_name: cardgamestore_api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      # Banco de dados
      ConnectionStrings__PostgreSQL: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-cardgamestore};Username=${POSTGRES_USER:-cardgame_user};Password=${POSTGRES_PASSWORD}"
      # JWT
      JwtSettings__SecretKey: "${JWT_SECRET}"
      JwtSettings__Issuer: "${APP_URL:-http://localhost}"
      JwtSettings__Audience: "TenantErp-Frontend"
      JwtSettings__AccessTokenExpirationMinutes: "60"
      JwtSettings__RefreshTokenExpirationDays: "30"
      # E-mail (Resend)
      SmtpSettings__Host: "${SMTP_HOST:-smtp.resend.com}"
      SmtpSettings__Port: "${SMTP_PORT:-587}"
      SmtpSettings__Username: "${SMTP_USERNAME:-resend}"
      SmtpSettings__Password: "${SMTP_PASSWORD}"
      SmtpSettings__FromEmail: "${SMTP_FROM_EMAIL:-noreply@tenant-erp.local}"
      SmtpSettings__FromName: "${SMTP_FROM_NAME:-Tenant ERP}"
      SmtpSettings__AppUrl: "${APP_URL:-http://localhost}"
      # Integrações
      GeminiSettings__ApiKey: "${GEMINI_API_KEY}"
      # Inter PJ — certificado mTLS (Client ID/Secret são salvos via /admin/integracoes)
      Inter__CertificatePath: "/app/certs/inter/inter.crt"
      Inter__KeyPath: "/app/certs/inter/inter.key"
      # Segurança — só true quando estiver atrás de HTTPS (Cloudflare); em teste
      # via IP puro/HTTP direto tem que ser false, senão o cookie nunca é aceito.
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      CorsSettings__AllowedOrigins: "${APP_URL:-http://localhost}"
      # Multi-tenancy — domínio raiz dos subdomínios de tenant (ex: loja.SEU_DOMINIO).
      # Sem isso, TenantResolutionMiddleware.ExtractSlug() nunca acha slug nenhum e
      # toda requisição cai em tenant-zero, mesmo com o wildcard configurado no Nginx.
      Multitenancy__RootDomain: "${MULTITENANCY_ROOT_DOMAIN}"
      Security__IpHashSalt: "${IP_HASH_SALT}"
      Encryption__Key: "${ENCRYPTION_KEY}"
    volumes:
      - api_uploads:/app/wwwroot/uploads
      - ./certs/inter:/app/certs/inter
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cardgame_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # POSTGRESQL — Banco relacional (comandas, usuários, etc.)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: cardgamestore_postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-cardgamestore}
      POSTGRES_USER:     ${POSTGRES_USER:-cardgame_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cardgame_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cardgame_user} -d ${POSTGRES_DB:-cardgamestore}"]
      interval: 10s
      timeout: 5s
      retries: 5

# -----------------------------------------------------------------------------
# Volumes persistentes (dados sobrevivem a reinicios e redeploys)
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
  api_uploads:

# -----------------------------------------------------------------------------
# Rede interna Docker (containers se falam pelo nome do serviço)
# -----------------------------------------------------------------------------
networks:
  cardgame_network:
    driver: bridge
