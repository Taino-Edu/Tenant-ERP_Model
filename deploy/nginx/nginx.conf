# =============================================================================
# nginx.conf — Proxy reverso para o Tenant-ERP
# Cloudflare (HTTPS) → Nginx (HTTP 80) → containers Docker
# =============================================================================

# DNS interno do Docker — resolve upstreams em runtime (evita falha na startup)
resolver 127.0.0.11 valid=10s ipv6=off;

# IPs reais dos visitantes via Cloudflare
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    # "_" mantém o fallback por IP puro; o domínio raiz e qualquer subdomínio
    # de tenant (*.3esysten.com.br, e o antigo *.2esysten.com.br mantido pelo
    # redirect na Cloudflare) são aceitos pelo mesmo server block — quem decide
    # o tenant a partir do Host é o TenantResolutionMiddleware, não o nginx.
    server_name _ 3esysten.com.br *.3esysten.com.br 2esysten.com.br *.2esysten.com.br;

    # Upload de imagens de produtos (até 10 MB)
    client_max_body_size 10M;

    # -------------------------------------------------------------------------
    # Frontend — Next.js 14
    # -------------------------------------------------------------------------
    location / {
        set $fe http://frontend:3000;
        proxy_pass         $fe;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # -------------------------------------------------------------------------
    # API — ASP.NET Core 8
    # -------------------------------------------------------------------------
    location /api/ {
        set $api http://api:5000;
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # -------------------------------------------------------------------------
    # MCP — o tenant pluga a IA dele no ERP (ver CardGameStore/Mcp/ErpTools.cs)
    #
    # Precisa de bloco próprio: /mcp não está sob /api/, então sem isto cai no
    # "location /" e é servido pelo FRONTEND — o cliente MCP receberia a página
    # 404 do Next.js em vez do servidor MCP.
    #
    # buffering off + timeout longo: a resposta é Server-Sent Events (o SDK
    # responde "text/event-stream"), e com buffering o nginx segura os eventos
    # até fechar a resposta, o que trava o cliente MCP.
    # -------------------------------------------------------------------------
    location /mcp {
        set $api http://api:5000;
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # -------------------------------------------------------------------------
    # SignalR — WebSocket (dashboard em tempo real)
    # -------------------------------------------------------------------------
    location /hubs/ {
        set $api http://api:5000;
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # -------------------------------------------------------------------------
    # Health check
    # -------------------------------------------------------------------------
    location /health {
        set $api http://api:5000;
        proxy_pass       $api;
        proxy_set_header Host $host;
        access_log       off;
    }

    # -------------------------------------------------------------------------
    # Uploads estáticos (imagens de produtos)
    # -------------------------------------------------------------------------
    location /uploads/ {
        set $api http://api:5000;
        proxy_pass         $api;
        proxy_set_header   Host $host;
        expires            7d;
        add_header         Cache-Control "public, no-transform";
    }
}
